groups:
  - name: microapp_alerts
    interval: 30s
    rules:
      - alert: AppHighErrorRate
        expr: |
          rate(app_request_count_total{status=~"5.."}[5m])
          / rate(app_request_count_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: AppHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(app_request_latency_seconds_bucket[5m])
          ) > 1.0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.instance }}"
          description: "p95 latency is {{ $value }}s (threshold: 1s)"

      - alert: AppDown
        expr: up{job="microapp"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Microapp is down"
          description: "Instance {{ $labels.instance }} has been down for 1 minute"

      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} is crash-looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted more than 3 times in 15 minutes"

      - alert: HighCPUUsage
        expr: |
          (sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod)
          / sum(kube_pod_container_resource_limits{resource="cpu"}) by (pod)) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on pod {{ $labels.pod }}"
          description: "CPU usage is {{ $value | humanizePercentage }} of limit"

      - alert: HighMemoryUsage
        expr: |
          (sum(container_memory_working_set_bytes{container!=""}) by (pod)
          / sum(kube_pod_container_resource_limits{resource="memory"}) by (pod)) > 0.90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage on pod {{ $labels.pod }}"
          description: "Memory usage is {{ $value | humanizePercentage }} of limit"
