apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

bases:
  - ../../base

namePrefix: dev-

replicas:
  - name: microapp
    count: 1

configMapGenerator:
  - name: microapp-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG

images:
  - name: REGISTRY_URL/microapp
    newTag: DEV_TAG
