---
# Service
apiVersion: v1
kind: Service
metadata:
  name: microapp-svc
  labels:
    app: microapp
spec:
  selector:
    app: microapp
  ports:
    - name: http
      port: 80
      targetPort: 5000
      protocol: TCP
  type: ClusterIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: microapp-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: microapp
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: microapp-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/microapp-irsa-role

---
# RBAC Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: microapp-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]

---
# RBAC RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: microapp-rolebinding
subjects:
  - kind: ServiceAccount
    name: microapp-sa
roleRef:
  kind: Role
  name: microapp-role
  apiGroup: rbac.authorization.k8s.io

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: microapp-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: microapp
